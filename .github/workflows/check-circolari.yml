name: Check Circolari

on:
  schedule:
    - cron: '0 6 * * *'   # ogni giorno alle 08:00 (UTC 6 = 8 in Italia estate)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 pillow resend

      - name: Run monitor
        run: python check_circolari.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: https://adelisa-srg.github.io/circolari-loria-monitor/

      - name: Commit updated state and dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add last_circolare.json last_news.json docs/data/dashboard.json

          git commit -m "Update circulars + news dashboard" || echo "No changes to commit"
          git push
